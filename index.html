<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qlickaholic Product</title> <!-- Ganti Judul Tab di Sini -->
    
    <!-- Favicon Polos (opsional, biar ga kosong banget tabnya) -->
    <link rel="icon" type="image/png" href="https://img.icons8.com/fluency/48/cursor.png">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background-color: #ffffff; font-family: sans-serif; }
        
        /* Gaya untuk Layar Loading */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: white; /* Warna background loading */
            display: flex;
            justify-content: center; /* Logo di tengah horizontal */
            align-items: center;     /* Logo di tengah vertikal */
            z-index: 9999;           /* Pastikan di atas iframe */
            transition: opacity 0.5s ease-out; /* Efek pudar saat hilang */
        }

        #loading-screen img {
            max-width: 80%;       /* Lebar maksimal logo (biar ga kegedean di HP) */
            height: auto;         /* Tinggi proporsional */
            animation: pulse 2s infinite; /* Efek animasi berdenyut */
        }

        /* Animasi berdenyut pelan */
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        /* Gaya untuk Iframe */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            opacity: 0; /* Sembunyikan iframe dulu */
            transition: opacity 0.5s ease-in; /* Efek pudar saat muncul */
        }

        /* Kelas untuk menampilkan iframe setelah loading selesai */
        iframe.loaded {
            opacity: 1;
        }
    </style>
</head>
<body>

    <!-- LAYAR LOADING DENGAN LOGO KAMU -->
    <div id="loading-screen">
        <img src="logo.png" alt="Qlickaholic Logo">
    </div>

    <!-- IFRAME APLIKASI KAMU -->
    <!-- GANTI 'LINK_WEB_APP_APPS_SCRIPT_KAMU' DENGAN URL ASLI -->
    <iframe src="https://script.google.com/macros/s/AKfycbwnMynUY25mHniT0VyhtuGXwR0VUbXWf35KzU3hQAXulhIE7X3HcjK0udrKqDmfBt47Bg/exec" id="app-iframe" onload="hideLoading()"></iframe>

    <script>
        // Fungsi untuk menyembunyikan loading screen setelah iframe selesai dimuat
        function hideLoading() {
            const loadingScreen = document.getElementById('loading-screen');
            const iframe = document.getElementById('app-iframe');
            
            // Beri sedikit jeda agar animasi loading terlihat
            setTimeout(() => {
                loadingScreen.style.opacity = '0'; // Buat loading pudar
                iframe.classList.add('loaded');    // Tampilkan iframe
                
                // Hapus elemen loading dari DOM setelah pudar
                setTimeout(() => {
                    loadingScreen.style.display = 'none';
                }, 500); // Samakan dengan durasi transition opacity
            }, 1500); // Jeda 1.5 detik (sesuaikan seleramu)
        }
    </script>
</body>
</html>
