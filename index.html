<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- 1. Ganti Judul Web Kamu -->
    <title>Qlickaholic — Produk Digital & Template Sheets</title>
    
    <!-- 2. Ganti Link Favicon/Logo (Opsional) -->
    <link rel="icon" type="image/png" href="https://www.google.com/s2/favicons?domain=github.com&sz=64">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; font-family: sans-serif; background-color: #F5F8F7; }
        iframe { width: 100%; height: 100%; border: none; display: block; }
    </style>
</head>
<body>

    <!-- Target Iframe -->
    <iframe id="appFrame" src="" allowfullscreen></iframe>

    <script>
        // 1. TEMPEL LINK WEB APP GOOGLE APPS SCRIPT KAMU DI SINI (Link Executable /exec)
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzrAElu44U8cIvvLk5-UfJs6J1bcqWZ4Dn7rGDahSejsHVL5cnF_JSowOhF8sPW7uWHEA/exec';

        // 2. Skrip Otomatis Meneruskan Query Parameter (misal: ?page=produk&id=123) ke Iframe
        const currentSearchParams = window.location.search;
        const iframeElement = document.getElementById('appFrame');

        if (currentSearchParams) {
            // Jika pengguna mengakses link dengan detail produk
            iframeElement.src = APPS_SCRIPT_URL + currentSearchParams;
        } else {
            // Jika pengguna mengakses halaman utama
            iframeElement.src = APPS_SCRIPT_URL;
        }
    </script>
</body>
</html>
