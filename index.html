<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qlickaholic — Produk Digital & Template Sheets</title>
    <link rel="icon" type="image/png" href="https://www.google.com/s2/favicons?domain=github.com&sz=64">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; font-family: sans-serif; background-color: #F5F8F7; }
        iframe { width: 100%; height: 100%; border: none; display: block; }
    </style>
</head>
<body>

    <iframe id="appFrame" src="" allowfullscreen></iframe>

    <script>
        // PASTE LINK EXEC APPS SCRIPT KAMU DI SINI
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyGARUyYFiw9uHMNBBMsjYWvMgSQ3L1dptFCuruk_2jpIil0euPhfJ-sfzMovwMV1fCkw/exec';

        // Tangkap parameter URL (?page=produk&id=xxx) dan teruskan ke Iframe
        const currentParams = window.location.search;
        const iframe = document.getElementById('appFrame');

        if (currentParams) {
            iframe.src = APPS_SCRIPT_URL + currentParams;
        } else {
            iframe.src = APPS_SCRIPT_URL;
        }
    </script>
</body>
</html>
